version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./notes:/app/notes
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/courses"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development service (optional)
  dev:
    build:
      context: .
      target: frontend-build
    ports:
      - "3000:3000"
      - "5000:5000"
    volumes:
      - ./src:/app/src
      - ./notes:/app/notes
      - ./server:/app/server
    environment:
      - NODE_ENV=development
    command: npm run dev
    profiles:
      - dev
